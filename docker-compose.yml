services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.srvrs.top
    env_file: mailserver.env
    ports:
      - "25:25"
      # - "143:143" # Disabled unencrypted IMAP
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./docker-data/mail-data:/var/mail
      - ./docker-data/mail-state:/var/mail-state
      - ./docker-data/mail-logs:/var/log/mail
      - ./docker-data/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    stop_grace_period: 1m
    cap_add:
      - NET_ADMIN

  autoconfig:
    image: wdes/mail-autodiscover-autoconfig:latest
    container_name: mail-autoconfig
    restart: always
    environment:
      - COMPANY_NAME=Srvrs Mail
      - SUPPORT_URL=https://srvrs.top
      - IMAP_HOST=mail.srvrs.top
      - IMAP_PORT=993
      - IMAP_SOCKET=SSL
      - SMTP_HOST=mail.srvrs.top
      - SMTP_PORT=465
      - SMTP_SOCKET=SSL
    ports:
      - "127.0.0.1:8000:80"

  postfix-exporter:
    image: kumina/postfix-exporter:latest
    container_name: mail-postfix-exporter
    restart: always
    volumes:
      - ./docker-data/mail-logs:/var/log/mail:ro
    ports:
      - "127.0.0.1:9154:9154"