services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: ${OVERRIDE_HOSTNAME:-mail.example.com}
    env_file: mailserver.env
    ports:
      - "25:25"
      # - "143:143" # Disabled unencrypted IMAP
      - "465:465"
      - "587:587"
      - "993:993"
      - "127.0.0.1:11334:11334" # Rspamd Web UI Dashboard
    volumes:
      - ./docker-data/mail-data:/var/mail
      - ./docker-data/mail-state:/var/mail-state
      - ./docker-data/mail-logs:/var/log/mail
      - ./docker-data/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    stop_grace_period: 1m
    cap_add:
      - NET_ADMIN

  autoconfig:
    image: wdes/mail-autodiscover-autoconfig:latest
    container_name: mail-autoconfig
    restart: always
    environment:
      - COMPANY_NAME=Mail Server autoconfig
      - SUPPORT_URL=https://${DOMAIN_NAME:-example.com}
      - IMAP_HOST=${OVERRIDE_HOSTNAME:-mail.example.com}
      - IMAP_PORT=993
      - IMAP_SOCKET=SSL
      - SMTP_HOST=${OVERRIDE_HOSTNAME:-mail.example.com}
      - SMTP_PORT=465
      - SMTP_SOCKET=SSL
    ports:
      - "127.0.0.1:8000:80"

  postfix-exporter:
    image: sergeymakinen/postfix_exporter:latest
    container_name: mail-postfix-exporter
    restart: always
    user: root
    volumes:
      - ./docker-data/mail-logs:/var/log/mail:ro
    command: --file.log /var/log/mail/mail.log
    ports:
      - "127.0.0.1:9154:9907"